name: Update Oracle

on:
  schedule:
    # Daily at 06:00 UTC during the tournament (June 11 - July 19, 2026)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Pull latest results
        run: curl -sL https://raw.githubusercontent.com/martj42/international_results/master/results.csv -o data/results.csv

      - name: Regenerate site
        run: python make_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.csv site/index.html
          git diff --cached --quiet || git commit -m "Matchday update: $(date -u +%Y-%m-%d)"
          git push
