<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 AI Oracle</title>
<meta name="description" content="10,000 simulated tournaments. Elo engine on 49,405 real internationals since 1872. Who lifts the trophy?">
<meta property="og:title" content="World Cup 2026 AI Oracle">
<meta property="og:description" content="Spain 28.4%. Argentina 20.3%. Find your team's road to July 19.">
<style>
:root{--bg:#0C1512;--panel:#13211A;--panel2:#0F1B15;--line:#24382E;--text:#ECF5EE;--mute:#8FAA99;--gold:#E9B44C;--silver:#BFC9C2;--bronze:#C98A4B;--pitch:#5BD68F;--hot:#E4572E}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;padding-bottom:64px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.wrap{max-width:680px;margin:0 auto;padding:0 20px}
header{padding:32px 0 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--bg))}
.kicker{color:var(--pitch);font-size:11px;letter-spacing:.3em;text-transform:uppercase}
h1{font-size:clamp(28px,7vw,40px);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;line-height:.95;margin-top:10px}
h1 span{color:var(--gold)}
.sub{color:var(--mute);font-size:13px;margin-top:12px;line-height:1.5}
nav{position:sticky;top:0;z-index:10;background:rgba(12,21,18,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 0}
nav .wrap{display:flex;gap:8px;overflow-x:auto}
.tab{padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;background:var(--panel);color:var(--mute);border:1px solid var(--line)}
.tab.on{background:var(--gold);color:#16130A;border-color:var(--gold)}
main{margin-top:24px}
.eyebrow{color:var(--mute);font-size:11px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px}
.row{width:100%;text-align:left;display:block;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:8px;cursor:pointer;color:var(--text);transition:transform .1s}
.row:active{transform:scale(.97)}
.rowtop{display:flex;align-items:center;gap:12px}
.rank{color:var(--mute);font-size:11px;width:18px}
.flag{font-size:20px}
.tname{font-weight:700;flex:1}
.pct{font-size:17px;font-weight:700}
.barbg{height:7px;border-radius:999px;background:var(--line);margin-top:8px;margin-left:30px;overflow:hidden}
.bar{height:7px;border-radius:999px;transition:width .7s}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
.chip{display:inline-block;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700;background:var(--panel);border:1px solid var(--hot);margin:0 6px 8px 0;cursor:pointer;color:var(--text)}
select{width:100%;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;margin-bottom:20px}
.step{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.node{width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.steplabel{display:flex;justify-content:space-between;font-size:13px}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
.gcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
.ghead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.gname{font-weight:900;color:var(--gold)}
.gteam{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer}
.gteam .nm{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gteam .b{width:72px}.gteam .v{font-size:11px;color:var(--mute);width:36px;text-align:right}
.fin{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.fin .a{flex:1;text-align:right;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;font-size:14px}
.fin .b2{flex:1;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;font-size:14px}
.note{color:var(--mute);font-size:12px;line-height:1.6;margin-top:16px}
footer{text-align:center;color:var(--mute);font-size:11px;margin-top:32px}
.hide{display:none}
</style>
</head>

</div></header>
<nav><div class="wrap">

<button class="tab" data-t="team">My team</button>
<button class="tab" data-t="groups">Groups</button>
<button class="tab" data-t="finals">Finals</button>

<main class="wrap">

<section id="team" class="hide"></section>

<section id="finals" class="hide"></section>

  let h=`<div class="eyebrow mono">Most likely finals &middot; New Jersey, July 19</div>`;
  D.finals.forEach((f,i)=>{h+=`<div class="fin" style="border-color:${i===0?css('--gold'):css('--line')}"><span class="flag">${FLAG[f.pair[0]]}</span><span class="a">${f.pair[0]}</span><span class="mono" style="font-size:11px;color:var(--mute)">vs</span><span class="b2">${f.pair[1]}</span><span class="flag">${FLAG[f.pair[1]]}</span><span class="mono" style="font-weight:700;color:${i===0?css('--gold'):css('--pitch')}">${f.pct.toFixed(1)}%</span></div>`;});
  h+=`<p class="note">Elo sees results, not rosters: injuries and tactics are invisible to it. Bracket approximated by constrained random allocation (FIFA's third-place mapping has 495 valid combinations). Odds are a strong prior, not prophecy.</p>`;
  document.getElementById('finals').innerHTML=h;}
function show(t){document.querySelectorAll('main section').forEach(s=>s.classList.add('hide'));document.getElementById(t).classList.remove('hide');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));window.scrollTo({top:0});}
function goTeam(t){sel=t;renderTeam();show('team');}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.t));
renderLadder();renderTeam();renderGroups();renderFinals();
</script>
